services:
  sharekhan-auto-trader:
    container_name: sharekhan-auto-trader-container
    build:
      context: .
      dockerfile: Dockerfile
    image: sharekhan-auto-trader
    restart: unless-stopped
    mem_limit: 640m
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-user-test}"
      SERVER_PORT: "${SERVER_PORT:-8080}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-}"
      APP_TELEGRAM_WEBHOOK_SECRET: "${APP_TELEGRAM_WEBHOOK_SECRET:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      GEMINI_ANALYSIS_ENABLED: "${GEMINI_ANALYSIS_ENABLED:-true}"
      GEMINI_MODEL: "${GEMINI_MODEL:-gemini-2.5-flash}"
      GEMINI_MAX_OUTPUT_TOKENS: "${GEMINI_MAX_OUTPUT_TOKENS:-2048}"
      GEMINI_THINKING_BUDGET: "${GEMINI_THINKING_BUDGET:-0}"
      TZ: Asia/Kolkata
      JAVA_OPTS: "${JAVA_OPTS:--Xms128m -Xmx384m -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/app/dumps -Xlog:gc*:file=/app/logs/gc.log:utctime}"
      ENABLE_DEBUG: "${ENABLE_DEBUG:-false}"
      ENABLE_JMX: "${ENABLE_JMX:-false}"
      JMX_PORT: "${JMX_PORT:-9010}"
      JMX_RMI_HOSTNAME: "${JMX_RMI_HOSTNAME:-127.0.0.1}"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ${DATA_DIR:-./data}:/app/data
      - ${LOG_DIR:-./logs}:/app/logs
      - ${DUMP_DIR:-./dumps}:/app/dumps
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
