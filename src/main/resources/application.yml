spring:
  profiles:
    active: user-test
  datasource:
    url: jdbc:h2:file:./data/scriptdb  # file-based for persistence
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: update   # or 'create' for fresh schema every run
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    time-zone: Asia/Kolkata
server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  ssl:
    enabled: ${SERVER_SSL_ENABLED:false}
    key-store: ${SERVER_SSL_KEY_STORE:}
    key-store-password: ${SERVER_SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
    key-alias: ${SERVER_SSL_KEY_ALIAS:spring-boot}
logging:
  level:
    org:
      com:
        sharekhan: INFO
      hibernate:
        SQL: OFF
        type:
          descriptor:
            sql: OFF
        orm:
          jdbc:
            bind: OFF
        tool:
          hbm2ddl: ERROR
      springframework:
        orm:
          jpa: ERROR

