spring:
  datasource:
    url: jdbc:h2:file:./data/scriptdbusertest  # file-based for persistence
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: update   # or 'create' for fresh schema every run
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    time-zone: Asia/Kolkata
server:
  port: 8080
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql: TRACE
        orm:
          jdbc:
            bind: TRACE
        tool:
          hbm2ddl: DEBUG
      springframework:
        data:
          repository: TRACE
        orm:
          jpa: DEBUG

